<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jens Piegsa — Galerie</title>
<meta name="description" content="Kunst an der Grenze zweier Welten. Art at the intersection of drawing and code.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;0,700;1,300&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080808;--bg2:#0f0f0f;--bg3:#161616;
  --accent:#c8a96e;--accent2:#8b6914;--accent-glow:rgba(200,169,110,.18);
  --text:#ede5d4;--muted:#7a7265;
  --border:#242424;--border2:#2e2e2e;--card:#111111;
  --free-bg:#0d1a0d;--premium-bg:#1a1400;
  --radius:10px;--radius-lg:16px;
  --shadow:0 8px 40px rgba(0,0,0,.6);
  --ease:cubic-bezier(.25,.46,.45,.94);
  --fs-xs:clamp(.7rem,1.2vw,.78rem);
  --fs-sm:clamp(.82rem,1.5vw,.9rem);
  --fs-base:clamp(.9rem,2vw,1rem);
  --fs-lg:clamp(1.1rem,2.5vw,1.3rem);
  --fs-xl:clamp(1.4rem,3.5vw,1.8rem);
  --fs-2xl:clamp(1.8rem,5vw,2.6rem);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Inter','Georgia',serif;font-size:var(--fs-base);line-height:1.6;min-height:100vh;overflow-x:hidden}
::selection{background:var(--accent-glow);color:var(--accent)}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--accent2)}

/* LANG BAR */
#lang-bar{background:#050505;border-bottom:1px solid var(--border);padding:.45rem 1.5rem;display:flex;gap:.3rem;flex-wrap:wrap;justify-content:flex-end;align-items:center}
[dir="rtl"] #lang-bar{justify-content:flex-start}
.lang-btn{background:none;border:1px solid #282828;color:#555;border-radius:4px;padding:.18rem .55rem;font-size:.68rem;cursor:pointer;letter-spacing:.06em;transition:all .2s var(--ease);font-family:'Inter',sans-serif;font-weight:500}
.lang-btn:hover,.lang-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(200,169,110,.08)}

/* HEADER */
header{border-bottom:1px solid var(--border);padding:clamp(1.5rem,4vw,2.5rem) 2rem;text-align:center;background:var(--bg2);position:relative}
header::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:60px;height:1px;background:var(--accent)}
header h1{font-family:'Playfair Display',Georgia,serif;font-size:var(--fs-2xl);color:var(--accent);letter-spacing:.12em;font-weight:300}
header p{color:var(--muted);margin-top:.5rem;font-style:italic;font-size:var(--fs-sm);letter-spacing:.03em}
header nav{margin-top:1.5rem;display:flex;gap:1.2rem;justify-content:center;flex-wrap:wrap}
header nav a{color:var(--muted);text-decoration:none;font-size:var(--fs-xs);letter-spacing:.08em;text-transform:uppercase;transition:color .2s;padding:.25rem 0;border-bottom:1px solid transparent}
header nav a:hover{color:var(--accent);border-bottom-color:var(--accent)}

/* HERO */
.hero{padding:clamp(2.5rem,6vw,4.5rem) 2rem;text-align:center;max-width:720px;margin:0 auto}
.hero h2{font-family:'Playfair Display',serif;font-size:var(--fs-xl);font-weight:300;color:var(--accent);margin-bottom:1rem;letter-spacing:.05em}
.hero p{line-height:2;color:var(--muted);font-size:var(--fs-sm)}

/* SECTION CARDS */
.sections{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(280px,100%),1fr));gap:1.25rem;padding:clamp(1rem,3vw,2rem);max-width:960px;margin:0 auto}
.sc{border:1px solid var(--border2);border-radius:var(--radius-lg);padding:clamp(1.5rem,3vw,2.2rem);cursor:pointer;transition:transform .3s var(--ease),border-color .3s,box-shadow .3s;position:relative;overflow:hidden;background:var(--card)}
.sc:hover{transform:translateY(-5px);border-color:var(--accent);box-shadow:0 12px 40px rgba(200,169,110,.12)}
.sc.free{background:var(--free-bg)}
.sc.premium{background:var(--premium-bg)}
.sc-icon{font-size:2rem;margin-bottom:1rem;display:block;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.badge{display:inline-block;margin-bottom:.75rem;font-size:.65rem;padding:.2rem .7rem;border-radius:99px;font-weight:600;letter-spacing:.1em;text-transform:uppercase}
.free .badge{background:rgba(144,238,144,.12);color:#90ee90;border:1px solid rgba(144,238,144,.25)}
.premium .badge{background:rgba(255,215,0,.1);color:#ffd700;border:1px solid rgba(255,215,0,.2)}
.sc h3{font-family:'Playfair Display',serif;font-size:var(--fs-lg);color:var(--accent);margin-bottom:.5rem;font-weight:400}
.sc p{color:var(--muted);font-size:var(--fs-sm);line-height:1.7}
.enter-btn{display:inline-flex;align-items:center;gap:.4rem;margin-top:1.5rem;padding:.6rem 1.5rem;border:1px solid var(--accent);color:var(--accent);border-radius:99px;font-size:var(--fs-xs);letter-spacing:.06em;background:transparent;cursor:pointer;transition:all .25s var(--ease);font-family:'Inter',sans-serif;font-weight:500}
.enter-btn:hover{background:var(--accent);color:var(--bg);transform:scale(1.03)}

/* GALLERY SECTIONS */
.gallery-section{display:none;padding:clamp(1rem,3vw,2rem);max-width:1200px;margin:0 auto}
.gallery-section.active{display:block;animation:fadeIn .3s var(--ease)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;flex-wrap:wrap;gap:1rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
.section-header h2{font-family:'Playfair Display',serif;color:var(--accent);font-weight:300;font-size:var(--fs-xl)}
.back-btn{display:inline-flex;align-items:center;gap:.4rem;padding:.45rem 1.1rem;border:1px solid var(--border2);color:var(--muted);background:none;border-radius:99px;cursor:pointer;font-size:var(--fs-xs);transition:all .2s;font-family:'Inter',sans-serif}
.back-btn:hover{border-color:var(--accent);color:var(--accent)}
.artwork-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(280px,100%),1fr));gap:1.25rem}

/* ARTWORK CARD */
.artwork-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:transform .3s var(--ease),border-color .3s,box-shadow .3s;position:relative}
.artwork-card:hover{transform:translateY(-4px);border-color:var(--accent);box-shadow:var(--shadow)}
.ribbon-reserved{position:absolute;top:14px;right:-30px;background:linear-gradient(135deg,#c00,#900);color:#fff;font-size:.62rem;font-weight:700;padding:.2rem 2.5rem;transform:rotate(35deg);letter-spacing:.1em;z-index:2;box-shadow:0 2px 8px rgba(0,0,0,.5)}
[dir="rtl"] .ribbon-reserved{right:auto;left:-30px;transform:rotate(-35deg)}
.artwork-img{width:100%;aspect-ratio:4/3;background:var(--bg3);overflow:hidden;position:relative}.artwork-img::after{content:"© Jens Piegsa";position:absolute;bottom:8px;right:10px;color:rgba(200,169,110,.82);font-family:"Playfair Display",Georgia,serif;font-style:italic;font-size:clamp(.58rem,1.3vw,.7rem);text-shadow:0 1px 3px rgba(0,0,0,.95),0 0 8px rgba(0,0,0,.8);pointer-events:none;letter-spacing:.04em;z-index:2;user-select:none;}
.artwork-img img{width:100%;height:100%;object-fit:cover;transition:transform .4s var(--ease)}
.artwork-card:hover .artwork-img img{transform:scale(1.04)}
.artwork-info{padding:1.25rem}
.artwork-info h4{font-family:'Playfair Display',serif;color:var(--accent);margin-bottom:.3rem;font-weight:400;font-size:var(--fs-base)}
.artwork-info .meta{color:var(--muted);font-size:var(--fs-xs);margin-bottom:.6rem;letter-spacing:.02em}
.artwork-info .desc{color:#bbb;font-size:var(--fs-sm);margin-bottom:.9rem;line-height:1.6}
.purchase-opts{border-top:1px solid var(--border);padding-top:.9rem;margin-top:.6rem}
.purchase-opts .opt{margin-bottom:.75rem}
.purchase-opts .opt-label{font-size:.7rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:.3rem}
.price-tag{color:#ffd700;font-size:var(--fs-base);font-weight:500;display:inline-block;margin-right:.5rem}
.btn-inquire{display:inline-flex;align-items:center;gap:.35rem;padding:.38rem .9rem;border:1px solid var(--accent);color:var(--accent);border-radius:99px;font-size:var(--fs-xs);text-decoration:none;cursor:pointer;background:transparent;transition:all .2s var(--ease);font-family:'Inter',sans-serif}
.btn-inquire:hover{background:var(--accent);color:var(--bg)}
.btn-reserved{display:inline-flex;align-items:center;gap:.35rem;padding:.38rem .9rem;border:1px solid #444;color:#666;border-radius:99px;font-size:var(--fs-xs)}
.free-tag{color:#90ee90;font-size:var(--fs-sm)}
.paypal-container{margin-top:.5rem}

/* MODALS */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);z-index:1000;justify-content:center;align-items:center;padding:1rem}
.modal-overlay.active{display:flex;animation:modalIn .25s var(--ease)}
@keyframes modalIn{from{opacity:0}to{opacity:1}}
.modal{background:rgba(16,14,10,.96);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:clamp(1.5rem,4vw,2.5rem);max-width:420px;width:100%;position:relative;box-shadow:var(--shadow),0 0 60px rgba(200,169,110,.08);animation:slideUp .3s var(--ease)}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.modal h3{font-family:'Playfair Display',serif;color:var(--accent);margin-bottom:1.5rem;font-weight:300;font-size:var(--fs-lg);letter-spacing:.03em}
.modal input{width:100%;padding:.75rem 1.1rem;background:rgba(255,255,255,.04);border:1px solid var(--border2);color:var(--text);border-radius:var(--radius);font-size:var(--fs-base);margin-bottom:.75rem;transition:border-color .2s;font-family:'Inter',sans-serif}
.modal input:focus{outline:none;border-color:var(--accent);background:rgba(200,169,110,.04)}
.modal label{color:var(--muted);font-size:var(--fs-xs);display:block;margin-bottom:.3rem;letter-spacing:.04em}
.btn-primary{width:100%;padding:.8rem;background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--bg);border:none;border-radius:99px;font-size:var(--fs-sm);cursor:pointer;letter-spacing:.06em;font-family:'Inter',sans-serif;font-weight:600;transition:all .25s var(--ease);display:flex;align-items:center;justify-content:center;gap:.5rem;margin-top:.5rem}
.btn-primary:hover{filter:brightness(1.1);transform:scale(1.01)}
.modal .close{position:absolute;top:1rem;right:1rem;background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--muted);cursor:pointer;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;transition:all .2s}
.modal .close:hover{background:rgba(255,255,255,.12);color:var(--text)}
[dir="rtl"] .modal .close{right:auto;left:1rem}
.modal .error{color:#ff6b6b;font-size:var(--fs-xs);margin-top:.5rem;display:none}
.modal .legal-note{font-size:var(--fs-xs);color:var(--muted);margin-top:1rem;line-height:1.6;border-top:1px solid var(--border);padding-top:1rem}
.modal .hint-link{color:var(--accent)}

/* FOOTER */
footer{text-align:center;padding:clamp(2rem,5vw,3rem) 2rem;color:var(--muted);font-size:var(--fs-xs);border-top:1px solid var(--border);margin-top:4rem;letter-spacing:.04em}
footer a{color:var(--accent);text-decoration:none;transition:opacity .2s}
footer a:hover{opacity:.8}
</style>
</head>
<body>

<div id="lang-bar">
  <button class="lang-btn" onclick="setLang('de')">DE</button>
  <button class="lang-btn" onclick="setLang('en')">EN</button>
  <button class="lang-btn" onclick="setLang('fr')">FR</button>
  <button class="lang-btn" onclick="setLang('es')">ES</button>
  <button class="lang-btn" onclick="setLang('it')">IT</button>
  <button class="lang-btn" onclick="setLang('ar')">AR</button>
  <button class="lang-btn" onclick="setLang('bs')">BS</button>
  <button class="lang-btn" onclick="setLang('sr')">SR</button>
  <button class="lang-btn" onclick="setLang('lt')">LT</button>
  <button class="lang-btn" onclick="setLang('zh')">ZH</button>
  <button class="lang-btn" onclick="setLang('ja')">JA</button>
</div>

<header>
  <h1>Jens Piegsa</h1>
  <p data-i18n="subtitle"></p>
  <nav>
    <a href="#" onclick="showLanding();return false;" data-i18n="nav_gallery"></a>
    <a href="https://info.jens-piegsa.com" data-i18n="nav_about"></a>
    <a href="mailto:piegsa+art@gmail.com" data-i18n="nav_contact"></a>
    <a href="admin/" style="font-size:.7rem;opacity:.3;letter-spacing:.05em;">⚙</a>
  </nav>
</header>

<!-- LANDING — NUR FREE + PREMIUM öffentlich sichtbar -->
<div id="landing">
  <div class="hero">
    <h2 data-i18n="hero_title"></h2>
    <p data-i18n="hero_text"></p>
  </div>
  <div class="sections">
    <div class="sc free" onclick="enterSection('free')">
      <span class="sc-icon">🎨</span>
      <span class="badge" data-i18n="free_badge"></span>
      <h3 data-i18n="free_title"></h3>
      <p data-i18n="free_desc"></p>
      <button class="enter-btn" data-i18n="free_btn"></button>
    </div>
    <div class="sc premium" onclick="showModal('modal-premium')">
      <span class="sc-icon">⭐</span>
      <span class="badge" data-i18n="premium_badge"></span>
      <h3 data-i18n="premium_title"></h3>
      <p data-i18n="premium_desc"></p>
      <button class="enter-btn" data-i18n="premium_btn"></button>
    </div>
    <!-- +13 und +18: NICHT öffentlich — nur über manuell geteilte Links:
         gallery.jens-piegsa.com/#age13  und  #age18 -->
  </div>
</div>

<!-- Gallery Sections -->
<div id="section-free"    class="gallery-section"><div class="section-header"><h2 data-i18n="g_free"></h2><button class="back-btn" onclick="showLanding()" data-i18n="back"></button></div><div id="grid-free"    class="artwork-grid"></div></div>
<div id="section-premium" class="gallery-section"><div class="section-header"><h2 data-i18n="g_premium"></h2><button class="back-btn" onclick="showLanding()" data-i18n="back"></button></div><div id="grid-premium" class="artwork-grid"></div></div>
<div id="section-age13"   class="gallery-section"><div class="section-header"><h2 data-i18n="g_age13"></h2><button class="back-btn" onclick="showLanding()" data-i18n="back"></button></div><div id="grid-age13"   class="artwork-grid"></div></div>
<div id="section-age18"   class="gallery-section"><div class="section-header"><h2 data-i18n="g_age18"></h2><button class="back-btn" onclick="showLanding()" data-i18n="back"></button></div><div id="grid-age18"   class="artwork-grid"></div></div>

<!-- MODALS -->
<div id="modal-premium" class="modal-overlay">
  <div class="modal">
    <button class="close" onclick="closeModal('modal-premium')">✕</button>
    <h3 data-i18n="pm_title"></h3>
    <p style="color:var(--muted);font-size:.88rem;margin-bottom:1.2rem;">
      <span data-i18n="pm_hint"></span>
      <a href="mailto:piegsa+art@gmail.com" class="hint-link"> piegsa+art@gmail.com</a>
    </p>
    <input type="password" id="pw-premium" data-i18n-ph="pm_pw" onkeydown="if(event.key==='Enter')checkPremium()">
    <button class="btn-primary" onclick="checkPremium()" data-i18n="pm_btn"></button>
    <p class="error" id="err-premium" data-i18n="pm_err"></p>
  </div>
</div>

<div id="modal-age13" class="modal-overlay">
  <div class="modal">
    <button class="close" onclick="closeModal('modal-age13')">✕</button>
    <h3 data-i18n="a13_title"></h3>
    <input type="text" id="name-13" data-i18n-ph="a_name" maxlength="60">
    <label data-i18n="a_dob"></label>
    <input type="date" id="dob-13">
    <button class="btn-primary" onclick="checkAge(13)" data-i18n="a_btn"></button>
    <p class="error" id="err-age13"></p>
    <div class="legal-note" data-i18n="a13_legal"></div>
  </div>
</div>

<div id="modal-age18" class="modal-overlay">
  <div class="modal">
    <button class="close" onclick="closeModal('modal-age18')">✕</button>
    <h3 data-i18n="a18_title"></h3>
    <input type="text" id="name-18" data-i18n-ph="a_name" maxlength="60">
    <label data-i18n="a_dob"></label>
    <input type="date" id="dob-18">
    <input type="password" id="pw-18" data-i18n-ph="a18_pw" onkeydown="if(event.key==='Enter')checkAge18()">
    <button class="btn-primary" onclick="checkAge18()" data-i18n="a_btn"></button>
    <p class="error" id="err-age18"></p>
    <div class="legal-note" data-i18n="a18_legal"></div>
  </div>
</div>

<footer>
  <p>© 2026 Jens Piegsa &nbsp;·&nbsp;
     <a href="mailto:piegsa+art@gmail.com">piegsa+art@gmail.com</a> &nbsp;·&nbsp;
     <a href="https://info.jens-piegsa.com" data-i18n="footer_impressum"></a>
  </p>
</footer>

let currentLang=localStorage.getItem('piegsa_lang')||'de';
function t(k){return(T[currentLang]&&T[currentLang][k])||T.de[k]||k;}

function setLang(lang){
  if(!T[lang])return;
  currentLang=lang;
  localStorage.setItem('piegsa_lang',lang);
  document.documentElement.lang=lang;
  document.documentElement.dir=T[lang].dir||'ltr';
  document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=t(el.dataset.i18n));
  document.querySelectorAll('[data-i18n-ph]').forEach(el=>el.placeholder=t(el.dataset.i18nPh));
  document.querySelectorAll('.lang-btn').forEach(btn=>btn.classList.toggle('active',btn.textContent===lang.toUpperCase()));
  ['free','premium','age13','age18'].forEach(s=>{
    const sec=document.getElementById('section-'+s);
    if(sec&&sec.classList.contains('active')&&ARTWORKS[s])renderGrid(s,ARTWORKS[s]);
  });
}

/* +13 / +18 sind NICHT auf der Startseite sichtbar.

   https://gallery.jens-piegsa.com/#age13
   https://gallery.jens-piegsa.com/#age18  */
function checkHashAccess(){
  const h=location.hash;
  if(h==='#age13'||h==='#13'){showModal('modal-age13');history.replaceState(null,'',location.pathname);}
  if(h==='#age18'||h==='#18'){showModal('modal-age18');history.replaceState(null,'',location.pathname);}
}
window.addEventListener('load',checkHashAccess);
window.addEventListener('hashchange',checkHashAccess);

const HASHES={
  premium:'7842c2a547a07074b002f75bd7b7810875fe9eeb0aa8c8b5033726911532d311',
  age18:'a65b903e52d40dcb686114288eed28f2e2a610635b279c96500ca03f4fd56f2e'
};
const CONTACT_EMAIL='piegsa+art@gmail.com';
let ARTWORKS={};

async function sha256(msg){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function loadArtworks(){
  try{const r=await fetch('data/artworks.json?v='+Date.now());ARTWORKS=await r.json();}
  catch{ARTWORKS={free:[],premium:[],age13:[],age18:[]};}
  renderGrid('free',ARTWORKS.free||[]);
}
loadArtworks();

function showLanding(){
  document.getElementById('landing').style.display='block';
  document.querySelectorAll('.gallery-section').forEach(s=>s.classList.remove('active'));
}
function enterSection(name,data){
  document.getElementById('landing').style.display='none';
  document.querySelectorAll('.gallery-section').forEach(s=>s.classList.remove('active'));
  document.getElementById('section-'+name).classList.add('active');
  if(data)renderGrid(name,data);
}
function showModal(id){document.getElementById(id).classList.add('active');}
function closeModal(id){document.getElementById(id).classList.remove('active');document.querySelectorAll('#'+id+' .error').forEach(e=>e.style.display='none');}
document.querySelectorAll('.modal-overlay').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('active');}));

async function checkPremium(){
  const h=await sha256(document.getElementById('pw-premium').value);
  if(h===HASHES.premium){sessionStorage.setItem('piegsa_premium','1');closeModal('modal-premium');enterSection('premium',ARTWORKS.premium||[]);}
  else{const e=document.getElementById('err-premium');e.textContent=t('pm_err');e.style.display='block';}
}
function checkAge(minAge){
  const id='age'+minAge;
  const name=document.getElementById('name-'+minAge).value.trim();
  const dob=document.getElementById('dob-'+minAge).value;
  const err=document.getElementById('err-'+id);
  if(!name||!dob){err.textContent=t('fill_all');err.style.display='block';return;}
  const age=(Date.now()-new Date(dob))/(365.25*24*3600*1000);
  if(age>=minAge){sessionStorage.setItem('piegsa_'+id,'1');closeModal('modal-'+id);enterSection(id,ARTWORKS[id]||[]);}
  else{err.textContent=t('a13_err').replace('13',minAge);err.style.display='block';}
}
async function checkAge18(){
  const name=document.getElementById('name-18').value.trim();
  const dob=document.getElementById('dob-18').value;
  const pw=document.getElementById('pw-18').value;
  const err=document.getElementById('err-age18');
  if(!name||!dob){err.textContent=t('fill_all');err.style.display='block';return;}
  const age=(Date.now()-new Date(dob))/(365.25*24*3600*1000);
  const h=await sha256(pw);
  if(age>=18&&h===HASHES.age18){sessionStorage.setItem('piegsa_age18','1');closeModal('modal-age18');enterSection('age18',ARTWORKS.age18||[]);}
  else{err.textContent=age<18?t('a13_err').replace('13','18'):t('wrong_pw');err.style.display='block';}
}

function purchaseBlock(art){
  if(art.reserved){return`<div class="purchase-opts"><span class="btn-reserved">🔖 ${t('reserved')}</span>&nbsp;<a class="btn-inquire" href="mailto:${CONTACT_EMAIL}?subject=${encodeURIComponent(art.title)}">${t('waitlist')}</a></div>`;}
  let html='<div class="purchase-opts">';
  const addOpt=(label,price,id,isFree)=>{
    html+=`<div class="opt"><div class="opt-label">${label}</div>`;
    if(isFree){html+=`<span class="free-tag">${t('free_view')}</span>`;}
    else if(price&&!art.inquiry_only){html+=`<span class="price-tag">€ ${price}</span><div id="pp-${id}-${art.id}" class="paypal-container" data-amount="${price}" data-title="${art.title} (${label})" data-art-id="${art.id}"></div>`;}
    else{html+=`<a class="btn-inquire" href="mailto:${CONTACT_EMAIL}?subject=${encodeURIComponent(label+': '+art.title)}">${t('inquire')}</a>`;}
    html+='</div>';
  };
  if(art.type==='original'||art.type==='both')addOpt(t('original'),art.price_original,'orig',false);
  if(art.type==='reproduction'||art.type==='both')addOpt(t('reproduction'),art.price_reproduction,'repr',false);
  if(!art.type)html+=`<span class="free-tag">${t('free_view')}</span>`;
  html+='</div>';
  return html;
}
function renderGrid(section,artworks){
  const grid=document.getElementById('grid-'+section);
  if(!grid)return;
  if(!artworks||!artworks.length){grid.innerHTML=`<p style="color:var(--muted);grid-column:1/-1;padding:2rem 0;font-style:italic;">${t('coming_soon')}</p>`;return;}
  grid.innerHTML=artworks.map(art=>{
    const titleLang=art['title_'+currentLang]||art.title||'';
    const descLang=art['desc_'+currentLang]||art.desc||'';
    return`<div class="artwork-card">${art.reserved?`<div class="ribbon-reserved">${t('reserved')}</div>`:''}
<div class="artwork-img">${art.img?`<img src="${art.img}" alt="${titleLang}" loading="lazy">`:''}</div>
<div class="artwork-info">
  <h4>${titleLang}</h4>
  <div class="meta">${[art.year,art.medium,art.size].filter(Boolean).join(' · ')}</div>
  ${descLang?`<div class="desc">${descLang}</div>`:''}
  ${purchaseBlock(art)}
</div></div>`;
  }).join('');
  setTimeout(()=>{
    document.querySelectorAll('.paypal-container[data-amount]:not([data-rendered])').forEach(el=>{
      if(!window.paypal)return;
      el.dataset.rendered='1';
      paypal.Buttons({
        style:{layout:'horizontal',color:'gold',shape:'pill',label:'buynow',height:32},
        createOrder:(_,a)=>a.order.create({purchase_units:[{amount:{value:el.dataset.amount,currency_code:'EUR'},description:el.dataset.title+' — Jens Piegsa',payee:{email_address:CONTACT_EMAIL}}]}),
        onApprove:(_,a)=>a.order.capture().then(async(details)=>{el.innerHTML=`<p style="color:#90ee90;font-size:.85rem;margin-top:.5rem">${t('thank_you')}</p>`;const artId=el.dataset.artId;if(artId){const art=Object.values(ARTWORKS).flat().find(x=>x.id===artId);if(art){const p=details.payer||{};const nm=((p.name?.given_name||'')+' '+(p.name?.surname||'')).trim();await generateCertificate(art,nm,p.email_address||'',details.id||String(Date.now()));}}}),
        onError:console.error
      }).render(el);
    });
  },500);
}


/* ══ PDF PURCHASE CERTIFICATE (Item 4) ══════════════════════════════════ */
async function generateCertificate(art,payerName,payerEmail,orderId){
  if(typeof window.jspdf==='undefined'){console.warn('jsPDF not loaded');return;}
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a5'});
  const W=210,H=148;
  // Cream background
  doc.setFillColor(253,249,241);doc.rect(0,0,W,H,'F');
  // Double border
  doc.setDrawColor(200,169,110);doc.setLineWidth(0.9);doc.rect(7,7,W-14,H-14);
  doc.setLineWidth(0.3);doc.rect(10,10,W-20,H-20);
  // Corner ornaments
  const orn=(x,y)=>{doc.setFontSize(9);doc.setTextColor(200,169,110);doc.text('✦',x,y,{align:'center'});};
  orn(13,14);orn(W-13,14);orn(13,H-8);orn(W-13,H-8);
  // Title block
  doc.setFont('times','bold');doc.setFontSize(18);doc.setTextColor(45,32,12);
  doc.text('ECHTHEITSZERTIFIKAT',W/2,24,{align:'center'});
  doc.setFontSize(11);doc.setFont('times','italic');doc.setTextColor(120,90,40);
  doc.text('Certificate of Authenticity',W/2,31,{align:'center'});
  // Gold divider
  doc.setDrawColor(200,169,110);doc.setLineWidth(0.6);doc.line(25,35,W-25,35);
  doc.setLineWidth(0.2);doc.line(25,36.5,W-25,36.5);
  // Artwork details
  const titleLang=art['title_'+currentLang]||art.title||'';
  const rows=[
    ['Werk / Artwork:',titleLang+(art.year?' ('+art.year+')':'')],
    art.medium?['Technik / Medium:',art.medium]:null,
    art.size?['Maße / Size:',art.size]:null,
    ['Käufer / Purchaser:',payerName||payerEmail||'—'],
    ['Datum / Date:',new Date().toLocaleDateString('de-DE',{day:'2-digit',month:'long',year:'numeric'})],
  ].filter(Boolean);
  let y=46;
  rows.forEach(([lbl,val])=>{
    doc.setFont('times','normal');doc.setFontSize(10);doc.setTextColor(80,60,25);
    doc.text(lbl,22,y);
    doc.setFont('times','bold');doc.setTextColor(35,25,8);
    doc.text(String(val),78,y);
    y+=9;
  });
  // Certificate ID
  const certId=(orderId||Date.now().toString()).substring(0,20).toUpperCase().replace(/[^A-Z0-9]/g,'');
  doc.setDrawColor(200,169,110);doc.setLineWidth(0.2);doc.line(25,y+2,W-25,y+2);
  doc.setFont('times','normal');doc.setFontSize(7.5);doc.setTextColor(140,110,60);
  doc.text('Zertifikat-Nr. / Certificate No.: '+certId,W/2,y+8,{align:'center'});
  // Artist signature
  const sigY=H-30;
  doc.setDrawColor(160,130,60);doc.setLineWidth(0.4);doc.line(22,sigY,90,sigY);
  doc.setFont('times','bolditalic');doc.setFontSize(13);doc.setTextColor(45,32,12);
  doc.text('Jens Piegsa',56,sigY+6,{align:'center'});
  doc.setFont('times','normal');doc.setFontSize(8.5);doc.setTextColor(100,75,30);
  doc.text('Künstler / Artist',56,sigY+12,{align:'center'});
  // Footer
  doc.setFont('times','italic');doc.setFontSize(8);doc.setTextColor(150,120,60);
  doc.text('gallery.jens-piegsa.com  ·  piegsa+art@gmail.com',W/2,H-11,{align:'center'});
  // Download
  const safe=titleLang.replace(/[^a-zA-Z0-9äöüÄÖÜß]/g,'_').substring(0,40);
  doc.save('Zertifikat_'+safe+'_'+certId+'.pdf');
  // Offer email to buyer
  if(payerEmail){
    const subj=encodeURIComponent('Kaufbeleg & Zertifikat: '+titleLang);
    const body=encodeURIComponent(
      'Sehr geehrte*r '+( payerName||'Käufer*in')+',\n\n'+
      'herzlichen Dank für Ihren Kauf!\n\n'+
      'Werk: '+titleLang+(art.year?' ('+art.year+')':'')+
      (art.medium?'\nTechnik: '+art.medium:'')+
      (art.size?'\nMaße: '+art.size:'')+
      '\nZertifikat-Nr.: '+certId+
      '\n\nIm Anhang (Download) finden Sie das Echtheitszertifikat als PDF.\n\n'+
      'Mit freundlichen Grüßen\nJens Piegsa\ngallery.jens-piegsa.com'
    );
    setTimeout(()=>window.open('mailto:'+payerEmail+'?subject='+subj+'&body='+body),800);
  }
}

setLang(currentLang);

<script>
// ══════════════════════════════════════════════════════
// VIRTUELLE GALERISTIN — FAQ CHATBOT
// ══════════════════════════════════════════════════════
const GALERISTIN_NAME = 'Elena';
let chatOpen = false;
let chatStarted = false;

const FAQ = [
  {
    q: 'Über die Galerie',
    en: 'About the Gallery',
    a: 'Diese Galerie zeigt Werke von Jens Piegsa — Kunst an der Schnittstelle von Zeichnung und Code, von DDR-Kindheit und digitalem Zeitalter. Jedes Werk ist einzigartig und handgemacht.\n\n<em>This gallery features works by Jens Piegsa — art at the intersection of drawing and code.</em>'
  },
  {
    q: 'Preise & Verkauf',
    en: 'Prices & Purchase',
    a: 'Werke sind als **Original** oder **Reproduktion (Druck)** erhältlich. Preise ab ~€89 (Reproduktion) bis über €500 (Original). PayPal-Zahlung direkt auf der Website. Für Originale gerne anfragen!\n\n📧 piegsa+art@gmail.com'
  },
  {
    q: 'Originale & Reproduktionen',
    en: 'Originals & Prints',
    a: '**Originale** sind Einzelstücke — handsigniert, mit Echtheitszertifikat. **Reproduktionen** sind hochwertige Giclée-Drucke auf Kunstdruck-Papier, ebenfalls signiert und nummeriert.\n\nBei Interesse einfach anfragen!'
  },
  {
    q: 'Reservierung',
    en: 'How to Reserve',
    a: 'Sie können ein Werk **reservieren** lassen — senden Sie einfach eine E-Mail mit dem Werktitel. Reservierungen gelten 7 Tage.\n\n📧 piegsa+art@gmail.com\n\nBereits reservierte Werke sind mit 🔖 markiert.'
  },
  {
    q: 'Versand & Lieferung',
    en: 'Shipping',
    a: 'Versand weltweit. Originale werden professionell verpackt und versichert. Reproduktionen kommen gerollt in Kartonröhre. Lieferzeit: 3–14 Werktage je nach Zielland.\n\n<em>Worldwide shipping available.</em>'
  },
  {
    q: 'Über den Künstler',
    en: 'About the Artist',
    a: 'Jens Piegsa wurde in der DDR geboren, wuchs in Ostdeutschland auf und verbindet in seiner Kunst technisches Denken mit bildnerischem Handwerk. Studium der Computervisualistik, 2-jähriges Fernstudium Werbegrafik.\n\n🌐 info.jens-piegsa.com'
  },
  {
    q: 'Kontakt',
    en: 'Contact',
    a: '📧 piegsa+art@gmail.com\n🌐 gallery.jens-piegsa.com\n\nFür Anfragen zu Werken, Ausstellungen, Kooperationen oder Presse — ich freue mich!\n\n<em>For inquiries about artworks, exhibitions, or collaborations — happy to hear from you!</em>'
  }
];

function toggleChat() {
  chatOpen = !chatOpen;
  const bubble = document.getElementById('chat-bubble');
  bubble.classList.toggle('visible', chatOpen);
  document.getElementById('chat-notif').style.display = 'none';
  if (chatOpen && !chatStarted) { chatStarted = true; initChat(); }
}

function initChat() {
  addBotMsg(`Guten Tag! Ich bin **${GALERISTIN_NAME}**, Ihre virtuelle Galeristin. 🎨\n\n*Good day! I'm ${GALERISTIN_NAME}, your virtual gallery guide.*\n\nWie kann ich Ihnen helfen?`);
  showOptions(FAQ.map(f => f.q));
}

function addBotMsg(text) {
  const msgs = document.getElementById('chat-messages');
  const html = text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>').replace(/\n/g,'<br>');
  msgs.innerHTML += `<div class="cm bot"><div class="bot-name">✦ ${GALERISTIN_NAME}</div>${html}</div>`;
  msgs.scrollTop = msgs.scrollHeight;
}
function addUserMsg(text) {
  const msgs = document.getElementById('chat-messages');
  msgs.innerHTML += `<div class="cm user">${text}</div>`;
  msgs.scrollTop = msgs.scrollHeight;
}
function showOptions(opts) {
  const el = document.getElementById('chat-options');
  el.innerHTML = opts.map(o => `<button class="chat-opt" onclick="pickOption('${o}')">${o}</button>`).join('') +
    '<button class="chat-opt" onclick="pickOption(\'E-Mail senden\')">📧 E-Mail</button>' +
    '<button class="chat-opt" onclick="pickOption(\'Zurück\')" style="opacity:.6">↩ Zurück</button>';
}
function pickOption(opt) {
  document.getElementById('chat-options').innerHTML = '';
  if (opt === 'Zurück') { addBotMsg('Wie kann ich Ihnen noch helfen?'); showOptions(FAQ.map(f=>f.q)); return; }
  if (opt === 'E-Mail senden') {
    addUserMsg('E-Mail schreiben'); 
    addBotMsg('Sehr gerne! Klicken Sie hier um eine E-Mail zu senden:\n\n📧 <a href="mailto:piegsa+art@gmail.com?subject=Anfrage Galerie" style="color:#c8a96e">piegsa+art@gmail.com</a>\n\nIch antworte in der Regel innerhalb von 24 Stunden.');
    showOptions(['Zurück']); return;
  }
  const faq = FAQ.find(f=>f.q===opt||f.en===opt);
  if (faq) { addUserMsg(opt); setTimeout(()=>{ addBotMsg(faq.a); showOptions(['Zurück']); }, 300); }
}

function sendUserMsg() {
  const input = document.getElementById('chat-user-input');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  addUserMsg(msg);
  document.getElementById('chat-options').innerHTML = '';
  
  // Simple keyword matching
  const ml = msg.toLowerCase();
  const matched = FAQ.find(f => 
    ml.includes(f.q.toLowerCase().split(' ')[0]) ||
    (f.en && ml.includes(f.en.toLowerCase().split(' ')[0])) ||
    ml.includes('preis') || ml.includes('price') ||
    (f.q==='Preise & Verkauf' && (ml.includes('kauf')||ml.includes('buy')||ml.includes('kosten')||ml.includes('cost'))) ||
    (f.q==='Versand & Lieferung' && (ml.includes('versand')||ml.includes('ship')||ml.includes('liefer'))) ||
    (f.q==='Über den Künstler' && (ml.includes('artist')||ml.includes('künstler')||ml.includes('jens')||ml.includes('wer')||ml.includes('who'))) ||
    (f.q==='Kontakt' && (ml.includes('kontakt')||ml.includes('contact')||ml.includes('email')||ml.includes('mail'))) ||
    (f.q==='Reservierung' && (ml.includes('reserv')||ml.includes('book')||ml.includes('hold')))
  );
  
  setTimeout(() => {
    if (matched) {
      addBotMsg(matched.a);
      showOptions(['Zurück']);
    } else {
      addBotMsg('Das kann ich gerne weiterleiten! Für detaillierte Anfragen:\n\n📧 <a href="mailto:piegsa+art@gmail.com?subject=Anfrage: '+encodeURIComponent(msg)+'" style="color:#c8a96e">piegsa+art@gmail.com</a>');
      showOptions(['Zurück']);
    }
  }, 400);
}

// Show notification after 3s
setTimeout(() => {
  if (!chatOpen) {
    document.getElementById('chat-notif').style.display='flex';
  }
}, 3000);
</script>
